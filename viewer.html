<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جداول التقاعد الاختياري — عرض مشارَك</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1f3c; --navy-md: #1e3a6e; --navy-lt: #2a5298;
  --gold: #b8943f; --gold-lt: #d4af6a; --gold-dk: #8c6d28;
  --cream: #f8f4ec; --white: #ffffff; --ink: #1a1208;
  --green: #2d6a4f; --red: #8b2020; --muted: #7a6e5f;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(160deg, #0b1b35 0%, #1e3a6e 60%, #0d1f3c 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.container {
  background: var(--white); border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  max-width: 480px; width: 100%; overflow: hidden;
  animation: slideUp .4s ease;
}
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:none;opacity:1} }
.header {
  background: linear-gradient(135deg, #091729 0%, var(--navy-md) 100%);
  padding: 28px 24px 20px; text-align: center;
  border-bottom: 3px solid var(--gold);
}
.header-logo {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dk), var(--gold-lt));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 14px;
  box-shadow: 0 0 0 4px rgba(184,148,63,.3), 0 8px 24px rgba(0,0,0,.4);
}
.header h1 {
  font-family: 'Amiri', serif; font-size: 1.4rem; color: var(--gold-lt);
  margin-bottom: 6px;
}
.header p { font-size: .8rem; color: #b0c4de; }
.person-info {
  padding: 20px 24px; background: #eef2f9;
  border-bottom: 1px solid rgba(13,31,60,.1);
}
.person-info h2 {
  font-family: 'Amiri', serif; font-size: 1.15rem; color: var(--navy);
  margin-bottom: 6px;
}
.person-info p { font-size: .8rem; color: var(--muted); }
.actions {
  padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.action-title {
  font-size: .75rem; font-weight: 800; color: var(--navy-md);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 4px;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 16px 24px; border-radius: 12px;
  font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700;
  cursor: pointer; border: none; transition: all .2s; text-decoration: none;
  width: 100%;
}
.btn:active { transform: scale(.97); }
.btn-download {
  background: linear-gradient(135deg, var(--green) 0%, #40916c 100%);
  color: var(--white); box-shadow: 0 4px 16px rgba(45,106,79,.35);
  font-size: 1.05rem;
}
.btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,.5); }
.btn-print {
  background: linear-gradient(135deg, var(--gold-dk) 0%, var(--gold) 100%);
  color: var(--white); box-shadow: 0 4px 16px rgba(184,148,63,.3);
}
.btn-print:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,148,63,.45); }
.divider {
  display: flex; align-items: center; gap: 10px; margin: 4px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(13,31,60,.12);
}
.divider span { font-size: .72rem; color: var(--muted); white-space: nowrap; }
.footer-note {
  padding: 14px 24px 20px; text-align: center;
  font-size: .72rem; color: var(--muted); line-height: 1.7;
  border-top: 1px solid rgba(13,31,60,.08);
}
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 24px; text-align: center;
}
.spinner {
  width: 48px; height: 48px; border: 4px solid rgba(13,31,60,.1);
  border-top-color: var(--navy-md); border-radius: 50%;
  animation: spin .8s linear infinite; margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--muted); font-size: .9rem; }
.error { padding: 40px 24px; text-align: center; }
.error-icon { font-size: 3rem; margin-bottom: 12px; }
.error h3 { color: var(--navy); margin-bottom: 8px; font-family: 'Amiri', serif; }
.error p { color: var(--muted); font-size: .85rem; line-height: 1.6; }
</style>
</head>

  }
  for(let i=1;i<total;i++){
    if(rows[i].cat-rows[i-1].cat>1)rows[i].cat=rows[i-1].cat+1;
    if(rows[i].cat>15)rows[i].cat=15;
    if(rows[i].cat<1)rows[i].cat=1;
  }
  return rows;
}

function loadData(){
  const hash=window.location.hash;
  const isV3=hash.startsWith('#s=');
  const isOld=hash.startsWith('#share=');
  if(!isV3&&!isOld)return null;
  try{
    const rawEnc=isV3?hash.slice(3):hash.slice(7);
    const encoded=rawEnc.replace(/-/g,'+').replace(/_/g,'/')+'=='.slice(0,(4-rawEnc.length%4)%4);
    const payload=JSON.parse(decodeURIComponent(escape(atob(encoded))));
    if(!payload)return null;
    let u_nm,u_g,u_ay,u_am,u_ts,u_py,u_pm,u_sa,plans;
    if(payload.v===3){
      const u=payload.u;
      u_nm=u[0];u_g=u[1]===1?'male':'female';
      u_ay=u[2];u_am=u[3];u_ts=u[4];u_py=u[5];u_pm=u[6];u_sa=u[7]||0;
      const descs=['أقرب عمر تقاعدي مع شراء','أقرب عمر تقاعدي بدون شراء',
                   'تقاعد عند إكمال '+(u_g==='male'?'63':'58')+' سنة',
                   'إكمال خدمة 32 سنة (أعلى راتب)'];
      plans=payload.p.map((p,i)=>({
        title:`الخطة ${i+1}`,desc:descs[i]||'خطة '+(i+1),
        targetAge:p[0],totalServiceMonths:p[1],purchaseMonths:p[2],
        pension:p[3]*1000,avg:p[4]*1000,purchaseCost:p[5]*1000,
        retireDate:new Date(p[6],0,1),
        yearsPlan:buildCatPlan(u_sa,p[0],p[7])
      }));
    }else if(payload.v===2){
      const u=payload.u;
      u_nm=u.nm;u_g=u.g;u_ay=u.ay;u_am=u.am;u_ts=u.ts;u_py=u.py;u_pm=u.pm;u_sa=u.sa||0;
      plans=payload.plans.map(p=>({
        title:p.ti,desc:p.de,targetAge:p.ag,totalServiceMonths:p.mo,
        purchaseMonths:p.bu,pension:p.pe,avg:p.av,purchaseCost:p.co,
        retireDate:new Date(p.rd),yearsPlan:buildCatPlan(u_sa,p.ag,p.sc)
      }));
    }else{
      const u=payload.u;
      u_nm=u.nm;u_g=u.g;u_ay=u.ay;u_am=u.am;u_ts=u.ts;u_py=u.py;u_pm=u.pm;u_sa=0;
      plans=payload.plans.map(p=>({
        title:p.title,desc:p.desc,targetAge:p.age,totalServiceMonths:p.mo,
        purchaseMonths:p.buy,pension:p.pension,avg:p.avg,purchaseCost:p.cost,
        retireDate:new Date(p.rd),
        yearsPlan:p.yp?p.yp.map((cat,idx)=>({age:p.age-p.yp.length+1+idx,cat})):buildCatPlan(0,p.age,1)
      }));
    }
    if(!plans?.length)return null;
    return{nm:u_nm,gender:u_g,ay:u_ay,am:u_am,ts:u_ts,py:u_py||0,pm:u_pm||0,sa:u_sa,plans};
  }catch(e){console.warn('Parse error:',e);return null;}
}

function downloadPDF(data){
  const html=generatePDF(data);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`جداول_تقاعد_${data.nm||'مشترك'}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function printPDF(data){
  const html=generatePDF(data);
  const win=window.open('','_blank','width=900,height=700');
  if(!win){alert('يرجى السماح بفتح النوافذ المنبثقة');return;}
  win.document.write(html);
  win.document.close();
  win.onload=function(){setTimeout(()=>{win.focus();win.print();},1200);};
}
